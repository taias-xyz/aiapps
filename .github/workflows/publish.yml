name: Publish

on:
  push:
    branches-ignore:
      - main
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Remove 'v' prefix from release tag (e.g., v1.0.0 -> 1.0.0)
            VERSION=${GITHUB_REF#refs/tags/v}

            # Validate version format (strict X.Y.Z only)
            if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "❌ Error: Invalid version format: '$VERSION'"
              echo "Expected format: X.Y.Z (major.minor.patch)"
              echo "Examples: 1.0.0, 1.2.3, 2.0.0"
              exit 1
            fi

            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "✅ Release version: $VERSION"
            echo "Release name: ${{ github.event.release.name }}"
            echo "Release body: ${{ github.event.release.body }}"
          else
            echo "version=0.0.0-dev.${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "✅ Dev version: 0.0.0-dev.${GITHUB_SHA::7}"
          fi

      - name: Setting version for @taias/aiapps
        working-directory: ./packages/core
        run: pnpm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Setting version for aiapps (alias)
        working-directory: ./packages/aiapps
        run: pnpm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Setting version for create-aiapps
        working-directory: ./packages/create-aiapps
        run: pnpm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Setting version for @taias/aiapps-devtools
        working-directory: ./packages/devtools
        run: pnpm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Publish @taias/aiapps to npm
        working-directory: ./packages/core
        run: pnpm publish --tag ${{ steps.version.outputs.tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish aiapps (alias) to npm
        working-directory: ./packages/aiapps
        run: pnpm publish --tag ${{ steps.version.outputs.tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish create-aiapps to npm
        working-directory: ./packages/create-aiapps
        run: pnpm publish --tag ${{ steps.version.outputs.tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish @taias/aiapps-devtools to npm
        working-directory: ./packages/devtools
        run: pnpm publish --tag ${{ steps.version.outputs.tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Bump versions
        if: github.event_name == 'release'
        run: node scripts/bump.js ${{ steps.version.outputs.version }} && pnpm install --no-frozen-lockfile

      - name: Open bump PR
        if: github.event_name == 'release'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: bump aiapps versions to ${{ steps.version.outputs.version }}"
          title: "chore: bump aiapps versions to ${{ steps.version.outputs.version }}"
          body: "Automated version bump of aiapps dependencies in templates and examples."
          branch: chore/bump-versions
          base: main
          delete-branch: true
