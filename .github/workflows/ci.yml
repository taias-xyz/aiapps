name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit Tests
            command: pnpm run test:unit
          - name: Type Check
            command: pnpm run test:type
          - name: Lint & Format
            command: pnpm run test:format
          - name: Build
            command: pnpm run build
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  create-aiapps-template:
    name: create-aiapps template
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install template dependencies with workspace package versions
        run: pnpm add "@taias/aiapps@workspace:0.0.0" "@taias/aiapps-devtools@workspace:0.0.0" --filter apps-sdk-template

      - name: Build core, alias, and devtools
        run: |
          pnpm --filter @taias/aiapps build
          pnpm --filter aiapps build
          pnpm --filter @taias/aiapps-devtools build

      - name: Build template
        run: pnpm --filter apps-sdk-template run build

  windows:
    name: Windows build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  draft-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
